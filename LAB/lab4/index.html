<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation Example</title>
    <style>
        img {
            width: 200px;
            height: auto;
            border: 10px solid black;
            transition: border-color 0.3s ease;
        }
    </style>
</head>
<body>

    <h1 id="header">This is a DOM program</h1>
    <p class="paragraph">This is a DOM paragraph</p>
    <p class="paragraph">Another DOM paragraph</p>
    <button id="button">Button</button>
    <br><br>
    <img src="https://gratisography.com/wp-content/uploads/2024/11/gratisography-augmented-reality-800x525.jpg" alt="Image" id="imageS">

    <script>
        // Change header color
        let header = document.getElementById('header');
        header.style.color = "blue";

        // Modify paragraphs
        let paragraphs = document.getElementsByClassName('paragraph');
        for (let i = 0; i < paragraphs.length; i++) {
            paragraphs[i].style.fontWeight = 'bold';
            paragraphs[i].style.color = 'red';
        }

        // Button event handlers
        let button = document.getElementById('button');
        function handleClick() {
            alert("Clicked me?");
        }

        function mouseHover() {
            button.style.backgroundColor = 'red';
            button.style.color = 'white';
        }

        function mouseNotHover() {
            button.style.backgroundColor = '';
            button.style.color = 'black';
        }

        button.addEventListener('click', handleClick);
        button.addEventListener('mouseover', mouseHover);
        button.addEventListener('mouseout', mouseNotHover);

        // Image hover event - Change border color
        let imageS = document.getElementById('imageS');
        imageS.addEventListener("mouseover", function () {
            this.style.borderColor = "red";
        });

        imageS.addEventListener("mouseout", function () {
            this.style.borderColor = "black";
        });

        // Document keypress event
        document.addEventListener("keydown", function (event) {
            console.log("Key pressed:", event.key);
        });

    </script>
    
</body>
</html>
